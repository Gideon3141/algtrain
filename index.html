<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cube Timer</title>
  <link rel="stylesheet" href="style-index.css" />
  <style>
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7); z-index: 999;
    }
    .auth-modal {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #222; padding: 20px; border-radius: 12px; z-index: 1000;
      flex-direction: column; gap: 12px; border: 1px solid #444; width: 300px;
    }
    .auth-input {
      padding: 10px; border-radius: 6px; border: 1px solid #555; background: #333; color: white;
    }
    .auth-btn {
      padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold;
    }
  </style>
</head>
<body>
<script src="dark-mode.js"></script>

<header style="display: flex; justify-content: space-between; align-items: flex-start; padding: 20px; flex-wrap: wrap; gap: 15px;">
  <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
    <a href="admin.html" id="adminLink" style="display: none; background-color: #9c27b0; color: white; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: bold; font-family: sans-serif;">Admin Panel</a>

    <button id="openAuthModalBtn" class="auth-btn" style="background-color: #4CAF50; color: white;">
      Sign In / Sign Up
    </button>
    <button id="accountBtn" class="auth-btn" style="background-color: #2196F3; color: white; display: none;">
      Account
    </button>
  </div>

  <button id="dark-mode-toggle" style="padding: 8px 16px; border-radius: 8px; border: none; background-color: #333; color: white; cursor: pointer; font-size: 1.2rem;">
    🌙
  </button>
</header>

<div class="modal-overlay" id="modalOverlay"></div>

<div class="auth-modal" id="authModal">
  <h2 style="color: white; margin-top: 0; text-align: center;">Welcome</h2>
  <button id="googleSignIn" class="auth-btn" style="background-color: #4285F4; color: white;">Sign in with Google</button>
  <div style="color: #888; text-align: center; margin: 10px 0;">OR</div>
  <input type="email" id="emailInput" class="auth-input" placeholder="Email">
  <input type="password" id="passwordInput" class="auth-input" placeholder="Password">
  <div style="display: flex; gap: 10px;">
    <button id="emailSignInBtn" class="auth-btn" style="flex: 1; background-color: #2196F3; color: white;">Sign In</button>
    <button id="emailSignUpBtn" class="auth-btn" style="flex: 1; background-color: #FF9800; color: white;">Sign Up</button>
  </div>
  <p id="authErrorMsg" style="color: #ff6b6b; font-size: 0.85rem; text-align: center; margin: 0; min-height: 20px;"></p>
  <button id="closeModalBtn" class="auth-btn" style="background-color: #555; color: white; margin-top: 10px;">Cancel</button>
</div>

<div class="auth-modal" id="accountModal">
  <h2 style="color: white; margin-top: 0; text-align: center;">Account</h2>
  <div style="color: white; margin-bottom: 15px; font-size: 1rem; line-height: 1.6;">
    <strong>Name:</strong> <span id="accNameDisplay"></span><br>
    <strong>Email:</strong> <span id="accEmailDisplay"></span>
  </div>
  <button id="modalSignOutBtn" class="auth-btn" style="background-color: #f44336; color: white;">Sign Out</button>
  <button id="closeAccountModalBtn" class="auth-btn" style="background-color: #555; color: white; margin-top: 5px;">Close</button>
</div>

<h1 style="text-align: center; margin-top: 10px;">Cube Timer</h1>
<div class="event-grid">
  <a href="category.html?event=3x3" class="event-card">
    <div class="event-title">3x3</div>
    <img src="images/3x3 image.png" alt="3x3 Cube" />
  </a>
  <a href="category.html?event=2x2" class="event-card">
    <div class="event-title">2x2</div>
    <img src="images/2x2 image.png" alt="2x2 Cube" />
  </a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA_DBD5S1sv7FGv_K6F7tUWxYs-JG3Jw-8",
    authDomain: "algdrill.firebaseapp.com",
    projectId: "algdrill",
    storageBucket: "algdrill.firebasestorage.app",
    messagingSenderId: "612013160",
    appId: "1:612013160:web:d664a05d36f71cf2c0d7dd",
    measurementId: "G-FKCJTNPWW2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  const db = getFirestore(app);

  const ADMIN_UIDS = ["CqkQ8vpZtZXVgxrvRJsuxIwOgkq1", "3X2xCCJMnYgvGIv4U9xSchP6UVn2"];

  // Elements
  const openAuthModalBtn = document.getElementById('openAuthModalBtn');
  const accountBtn = document.getElementById('accountBtn');
  
  const authModal = document.getElementById('authModal');
  const accountModal = document.getElementById('accountModal');
  const modalOverlay = document.getElementById('modalOverlay');
  
  const closeModalBtn = document.getElementById('closeModalBtn');
  const closeAccountModalBtn = document.getElementById('closeAccountModalBtn');
  const modalSignOutBtn = document.getElementById('modalSignOutBtn');
  const accNameDisplay = document.getElementById('accNameDisplay');
  const accEmailDisplay = document.getElementById('accEmailDisplay');
  
  const googleSignIn = document.getElementById('googleSignIn');
  const emailSignInBtn = document.getElementById('emailSignInBtn');
  const emailSignUpBtn = document.getElementById('emailSignUpBtn');
  const emailInput = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const authErrorMsg = document.getElementById('authErrorMsg');

  window.userCustomAlts = {};
  window.savedStatuses = {};

  // Login Modal logic
  function openModal() { authModal.style.display = 'flex'; modalOverlay.style.display = 'block'; authErrorMsg.textContent = ''; }
  function closeModal() { authModal.style.display = 'none'; modalOverlay.style.display = 'none'; }

  // Account Modal logic
  function openAccountModal() {
    accountModal.style.display = 'flex';
    modalOverlay.style.display = 'block';
    if (auth.currentUser) {
      accNameDisplay.textContent = auth.currentUser.displayName || "Not set";
      accEmailDisplay.textContent = auth.currentUser.email || "N/A";
    }
  }
  function closeAccountModal() { accountModal.style.display = 'none'; modalOverlay.style.display = 'none'; }

  openAuthModalBtn.addEventListener('click', openModal);
  closeModalBtn.addEventListener('click', closeModal);
  accountBtn.addEventListener('click', openAccountModal);
  closeAccountModalBtn.addEventListener('click', closeAccountModal);

  modalOverlay.addEventListener('click', () => { closeModal(); closeAccountModal(); });

  modalSignOutBtn.addEventListener('click', () => { signOut(auth); closeAccountModal(); });

  // Auth functions
  googleSignIn.addEventListener('click', async () => { try { await signInWithPopup(auth, provider); closeModal(); } catch (error) { authErrorMsg.textContent = error.message; } });
  emailSignUpBtn.addEventListener('click', async () => { try { await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value); closeModal(); } catch (error) { authErrorMsg.textContent = error.message.replace('Firebase: ', ''); } });
  emailSignInBtn.addEventListener('click', async () => { try { await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value); closeModal(); } catch (error) { authErrorMsg.textContent = error.message.replace('Firebase: ', ''); } });

  // Load user data
  async function loadUserData(user) {
    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);
    if (docSnap.exists()) {
      const data = docSnap.data();
      window.userCustomAlts = data.customAlts || {};
      window.savedStatuses = data.statuses || {};
    } else {
      window.userCustomAlts = {};
      window.savedStatuses = {};
      await setDoc(docRef, { customAlts: {}, statuses: {} });
    }
    localStorage.setItem('customAlts', JSON.stringify(window.userCustomAlts));
    localStorage.setItem('savedStatuses', JSON.stringify(window.savedStatuses));
  }

  // Track login state
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      openAuthModalBtn.style.display = 'none';
      accountBtn.style.display = 'inline-block';

      if (ADMIN_UIDS.includes(user.uid)) {
        document.getElementById('adminLink').style.display = 'inline-block';
      } else {
        document.getElementById('adminLink').style.display = 'none';
      }
      await loadUserData(user);
    } else {
      openAuthModalBtn.style.display = 'inline-block';
      accountBtn.style.display = 'none';
      if(document.getElementById('adminLink')) document.getElementById('adminLink').style.display = 'none';

      window.userCustomAlts = {};
      window.savedStatuses = {};
      localStorage.removeItem('customAlts');
      localStorage.removeItem('savedStatuses');
    }
  });
</script>

<footer style="position: fixed; bottom: 15px; left: 0; width: 100%; text-align: center; color: #888; font-size: 0.85rem; z-index: 10;">
  For support or bug reports contact <a href="mailto:algdrill.official@gmail.com" style="color: #4CAF50; text-decoration: none; font-weight: bold;">algdrill.official@gmail.com</a>
</footer>
</body>
</html>
