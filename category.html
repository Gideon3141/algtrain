<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Select Category</title>
  <link rel="stylesheet" href="style-home.css" />
  <style>
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7); z-index: 999;
    }
    .auth-modal {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #222; padding: 20px; border-radius: 12px; z-index: 1000;
      flex-direction: column; gap: 12px; border: 1px solid #444; width: 300px;
    }
    .auth-input {
      padding: 10px; border-radius: 6px; border: 1px solid #555; background: #333; color: white;
    }
    .auth-btn {
      padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold;
    }
    
    /* Centered Grid Layout Fix */
    .event-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center; /* Centers cards horizontally */
      align-items: flex-start;
      gap: 30px; /* Consistent space between cards */
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .event-card {
      cursor: pointer;
      text-align: center;
      transition: transform 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 250px; /* Fixed size to prevent overlapping */
      background: var(--bg-card);
      padding: 20px;
      border-radius: 20px;
      border: 2px solid var(--border-color);
      color: var(--text-primary);
    }

    .event-card:hover {
      transform: scale(1.05);
    }
    .image-placeholder {
      width: 150px;
      height: 150px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div style="position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 10px; z-index: 100;">
    <button id="openAuthModalBtn" class="auth-btn" style="background-color: #4CAF50; color: white;">
      Sign In / Sign Up
    </button>
    <button id="signOut" class="auth-btn" style="background-color: #f44336; color: white; display: none;">
      Sign out
    </button>
    <span id="userName" style="color: white; font-weight: bold;"></span>
  </div>

  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="auth-modal" id="authModal">
    <h2 style="color: white; margin-top: 0; text-align: center;">Welcome</h2>
    <button id="googleSignIn" class="auth-btn" style="background-color: #4285F4; color: white;">Sign in with Google</button>
    <button id="microsoftSignIn" class="auth-btn" style="background-color: #2F2F2F; color: white; display: flex; align-items: center; justify-content: center; gap: 10px;">
      <img src="https://authjs.dev/img/providers/microsoft.svg" width="18"> Sign in with Microsoft
    </button>
    <div style="color: #888; text-align: center; margin: 10px 0;">OR</div>
    <input type="email" id="emailInput" class="auth-input" placeholder="Email">
    <input type="password" id="passwordInput" class="auth-input" placeholder="Password">
    <div style="display: flex; gap: 10px;">
      <button id="emailSignInBtn" class="auth-btn" style="flex: 1; background-color: #2196F3; color: white;">Sign In</button>
      <button id="emailSignUpBtn" class="auth-btn" style="flex: 1; background-color: #FF9800; color: white;">Sign Up</button>
    </div>
    <p id="authErrorMsg" style="color: #ff6b6b; font-size: 0.85rem; text-align: center; margin: 0; min-height: 20px;"></p>
    <button id="closeModalBtn" class="auth-btn" style="background-color: #555; color: white; margin-top: 10px;">Cancel</button>
  </div>

  <div style="position: absolute; top: 1rem; right: 1rem; display: flex; gap: 10px;">
    <button id="dark-mode-toggle" style="padding: 8px 14px; border-radius: 10px; border: none; background-color: #333; color: white; cursor: pointer;">
      🌙
    </button>
    <button id="home-button" style="padding: 8px 14px; border-radius: 10px; border: none; background-color: #333; color: white; cursor: pointer;">
      Home
    </button>
  </div>

  <main>
    <h1 id="page-title" style="text-align: center; margin-top: 60px;">Select a Category</h1>
    <div class="event-container" id="categoryGrid">
      <p style="color: white;">Loading categories...</p>
    </div>
  </main>

  <script src="dark-mode.js"></script>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, OAuthProvider, signInWithPopup, signOut, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA_DBD5S1sv7FGv_K6F7tUWxYs-JG3Jw-8",
      authDomain: "algdrill.firebaseapp.com",
      projectId: "algdrill",
      storageBucket: "algdrill.firebasestorage.app",
      messagingSenderId: "612013160",
      appId: "1:612013160:web:d664a05d36f71cf2c0d7dd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const microsoftProvider = new OAuthProvider('microsoft.com'); // ADDED
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const event = urlParams.get('event') || '3x3';
    document.getElementById('page-title').textContent = `${event} Categories`;

    const categoryGrid = document.getElementById('categoryGrid');

    async function loadCategories() {
      categoryGrid.innerHTML = '';
      try {
        const querySnapshot = await getDocs(collection(db, "global_algs"));
        let foundAny = false;

        querySnapshot.forEach((doc) => {
          if (doc.id.startsWith(`${event}_`)) {
            foundAny = true;
            const type = doc.id.replace(`${event}_`, "");
            const data = doc.data();
            const imgSrc = data.categoryImage || "images/OLL-3x3.png";

            const card = document.createElement('div');
            card.className = 'event-card';
            card.onclick = () => window.location.href = `algs.html?event=${event}&type=${type}`;
            
            card.innerHTML = `
              <h2>${type}</h2>
              <img src="${imgSrc}" alt="${type} Image" class="image-placeholder"/>
            `;
            categoryGrid.appendChild(card);
          }
        });

        if (!foundAny) {
          categoryGrid.innerHTML = `<p style="color:white;">No categories found for ${event}.</p>`;
        }
      } catch (error) {
        console.error("Error loading categories:", error);
        categoryGrid.innerHTML = `<p style="color:red;">Failed to load categories.</p>`;
      }
    }

    const openAuthModalBtn = document.getElementById('openAuthModalBtn');
    const signOutBtn = document.getElementById('signOut');
    const userNameSpan = document.getElementById('userName');
    const authModal = document.getElementById('authModal');
    const modalOverlay = document.getElementById('modalOverlay');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const googleSignIn = document.getElementById('googleSignIn');
    const microsoftSignIn = document.getElementById('microsoftSignIn'); // ADDED
    const emailSignInBtn = document.getElementById('emailSignInBtn');
    const emailSignUpBtn = document.getElementById('emailSignUpBtn');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const authErrorMsg = document.getElementById('authErrorMsg');

    function openModal() { authModal.style.display = 'flex'; modalOverlay.style.display = 'block'; authErrorMsg.textContent = ''; }
    function closeModal() { authModal.style.display = 'none'; modalOverlay.style.display = 'none'; }

    openAuthModalBtn.addEventListener('click', openModal);
    closeModalBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', closeModal);

    googleSignIn.addEventListener('click', async () => { try { await signInWithPopup(auth, provider); closeModal(); } catch (error) { authErrorMsg.textContent = error.message; } });
    
    // ADDED MICROSOFT LOGIN LOGIC
    microsoftSignIn.addEventListener('click', async () => { try { await signInWithPopup(auth, microsoftProvider); closeModal(); } catch (error) { authErrorMsg.textContent = error.message; } });

    emailSignUpBtn.addEventListener('click', async () => { try { await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value); closeModal(); } catch (error) { authErrorMsg.textContent = error.message.replace('Firebase: ', ''); } });
    emailSignInBtn.addEventListener('click', async () => { try { await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value); closeModal(); } catch (error) { authErrorMsg.textContent = error.message.replace('Firebase: ', ''); } });
    signOutBtn.addEventListener('click', () => { signOut(auth); });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        openAuthModalBtn.style.display = 'none';
        signOutBtn.style.display = 'inline-block';
        userNameSpan.textContent = `Hello, ${user.displayName || user.email}`;
      } else {
        openAuthModalBtn.style.display = 'inline-block';
        signOutBtn.style.display = 'none';
        userNameSpan.textContent = '';
      }
      loadCategories();
    });

    document.getElementById('home-button').addEventListener('click', () => {
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
