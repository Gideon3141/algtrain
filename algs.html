<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Algorithms</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="stylesheet" href="style-algs.css" />
  <style>
    #filters-toggle { display: none; }
    @media (max-width: 768px) {
      #filters-toggle { display: block; margin: 10px; padding: 8px 12px; border-radius: 8px; background-color: #333; color: white; border: none; font-weight: bold; cursor: pointer; }
      .filters { position: static; flex-direction: column; margin: 10px; gap: 8px; }
    }
    
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 999; }
    .auth-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 20px; border-radius: 12px; z-index: 1000; flex-direction: column; gap: 12px; border: 1px solid #444; width: 300px; color: white; }
    .auth-input { padding: 10px; border-radius: 6px; border: 1px solid #555; background: #333; color: white; }
    .auth-btn { padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <header>
    <nav>
      <button id="to-timer">Timer</button>
      <button id="to-algs" disabled>Algorithms</button>
      <div style="margin-left: auto; margin-right: auto; display: flex; gap: 10px;">
        <button id="dark-mode-toggle">🌙</button>
        <button id="home-button">Home</button>
      </div>
    </nav>
  </header>

  <div id="login-div" style="margin: 20px; display: flex; align-items: center; justify-content: space-between;">
    <div style="display: flex; gap: 10px;">
      <button id="openAuthModalBtn" class="auth-btn" style="background-color: #4CAF50; color: white;">
        Sign In / Sign Up
      </button>
      <button id="accountBtn" class="auth-btn" style="background-color: #2196F3; color: white; display: none;">
        Account
      </button>
    </div>
    
    <button id="notationBtn" class="auth-btn" style="background-color: #2196F3; color: white;">
      Notation & About
    </button>
  </div>

  <div class="modal-overlay" id="modalOverlay"></div>
  
  <div class="auth-modal" id="authModal">
    <h2 style="margin-top: 0; text-align: center;">Welcome</h2>
    <button id="googleSignIn" class="auth-btn" style="background-color: #4285F4; color: white;">Sign in with Google</button>
    <div style="color: #888; text-align: center; margin: 5px 0;">OR</div>
    <input type="email" id="emailInput" class="auth-input" placeholder="Email">
    <input type="password" id="passwordInput" class="auth-input" placeholder="Password">
    <div style="display: flex; gap: 10px;">
      <button id="emailSignInBtn" class="auth-btn" style="flex: 1; background-color: #2196F3; color: white;">Sign In</button>
      <button id="emailSignUpBtn" class="auth-btn" style="flex: 1; background-color: #FF9800; color: white;">Sign Up</button>
    </div>
    <p id="authErrorMsg" style="color: #ff6b6b; font-size: 0.85rem; text-align: center; margin: 0; min-height: 20px;"></p>
    <button id="closeModalBtn" class="auth-btn" style="background-color: #555; color: white; margin-top: 10px;">Cancel</button>
  </div>

  <div class="auth-modal" id="accountModal">
    <h2 style="color: white; margin-top: 0; text-align: center;">Account</h2>
    <div style="color: white; margin-bottom: 15px; font-size: 1rem; line-height: 1.6;">
      <strong>Name:</strong> <span id="accNameDisplay"></span><br>
      <strong>Email:</strong> <span id="accEmailDisplay"></span>
    </div>
    <button id="modalSignOutBtn" class="auth-btn" style="background-color: #f44336; color: white;">Sign Out</button>
    <button id="closeAccountModalBtn" class="auth-btn" style="background-color: #555; color: white; margin-top: 5px;">Close</button>
  </div>

  <div class="auth-modal" id="notationModal" style="width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;">
    <h2 style="color: white; margin-top: 0; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px;">Notation & About</h2>
    <div id="notationList" style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; color: white;">
      <div style="text-align: center; color: #888;">Loading...</div>
    </div>
    <button id="closeNotationModalBtn" class="auth-btn" style="background-color: #555; color: white; width: 100%;">Close</button>
  </div>

  <button id="filters-toggle" class="filters-toggle">Filters ▼</button>

  <div class="filters">
    <label><input type="checkbox" value="not learnt" checked> Not Learnt</label>
    <label><input type="checkbox" value="learning" checked> Learning</label>
    <label><input type="checkbox" value="complete" checked> Complete</label>
  </div>

  <main>
    <div id="alg-list"></div>
  </main>

  <script src="dark-mode.js"></script>
  <script type="module" src="script-algs.js"></script>

  <script>
    const filtersToggle = document.getElementById('filters-toggle');
    const filtersDiv = document.querySelector('.filters');

    function updateFilterVisibility() {
      if (window.innerWidth <= 768) filtersDiv.style.display = 'none';
      else filtersDiv.style.display = 'flex';
    }

    filtersToggle.addEventListener('click', () => {
      const isVisible = filtersDiv.style.display === 'block' || filtersDiv.style.display === 'flex';
      if (isVisible) { filtersDiv.style.display = 'none'; filtersToggle.textContent = 'Filters ▼'; } 
      else { filtersDiv.style.display = 'flex'; filtersToggle.textContent = 'Filters ▲'; }
    });

    window.addEventListener('resize', updateFilterVisibility);
    updateFilterVisibility();
  </script>

  <script type="module">
    import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA_DBD5S1sv7FGv_K6F7tUWxYs-JG3Jw-8",
      authDomain: "algdrill.firebaseapp.com",
      projectId: "algdrill",
      storageBucket: "algdrill.firebasestorage.app",
      messagingSenderId: "612013160",
      appId: "1:612013160:web:d664a05d36f71cf2c0d7dd"
    };
    
    const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
    const db = getFirestore(app);

    const notationBtn = document.getElementById('notationBtn');
    const notationModal = document.getElementById('notationModal');
    const modalOverlay = document.getElementById('modalOverlay');
    const closeNotationModalBtn = document.getElementById('closeNotationModalBtn');
    const notationListDiv = document.getElementById('notationList');

    notationBtn.addEventListener('click', async () => {
      notationModal.style.display = 'flex';
      modalOverlay.style.display = 'block';

      if (notationListDiv.innerHTML.includes("Loading")) {
        try {
          const docRef = doc(db, "global_algs", "notation_guide");
          const docSnap = await getDoc(docRef);
          
          if (docSnap.exists() && docSnap.data().items && docSnap.data().items.length > 0) {
            notationListDiv.innerHTML = '';
            docSnap.data().items.forEach(item => {
              const row = document.createElement('div');
              row.style.display = 'flex';
              row.style.alignItems = 'center';
              row.style.gap = '15px';
              row.style.background = '#111';
              row.style.padding = '10px';
              row.style.borderRadius = '8px';
              row.style.border = '1px solid #333';

              // CHANGED: If there is no image link provided, don't show the image box at all!
              let imgHtml = '';
              if (item.image && item.image.trim() !== '') {
                  imgHtml = `<img src="${item.image}" style="width: 120px; height: 120px; object-fit: contain; border-radius: 6px; background: #222;" onerror="this.src='https://via.placeholder.com/120?text=Error'">`;
              }
              
              row.innerHTML = `
                ${imgHtml}
                <div style="flex: 1;">
                  <strong style="font-size: 1.5rem; color: #4CAF50;">${item.move || ''}</strong>
                  <div style="font-size: 1.1rem; color: #ccc; margin-top: 6px; line-height: 1.4;">${item.desc || ''}</div>
                </div>
              `;
              notationListDiv.appendChild(row);
            });
          } else {
            notationListDiv.innerHTML = '<div style="text-align: center; color: #888;">No guide available yet. Add one in the Admin Panel!</div>';
          }
        } catch (e) {
          notationListDiv.innerHTML = '<div style="text-align: center; color: #ff6b6b;">Error loading data.</div>';
        }
      }
    });

    closeNotationModalBtn.addEventListener('click', () => { notationModal.style.display = 'none'; modalOverlay.style.display = 'none'; });
    modalOverlay.addEventListener('click', () => { notationModal.style.display = 'none'; });
  </script>

</body>
</html>
