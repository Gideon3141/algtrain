<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Algorithms</title>
  <link rel="stylesheet" href="style-algs.css" />
  <style>
    /* Hide filter toggle on desktop */
    #filters-toggle {
      display: none;
    }

    @media (max-width: 768px) {
      #filters-toggle {
        display: block;
        margin: 10px;
        padding: 8px 12px;
        border-radius: 8px;
        background-color: #333;
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
      }

      .filters {
        position: static;
        flex-direction: column;
        margin: 10px;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <button id="to-timer">Timer</button>
      <button id="to-algs" disabled>Algorithms</button>
      <div style="margin-left: auto; margin-right: auto; display: flex; gap: 10px;">
        <button id="dark-mode-toggle">🌙</button>
        <button id="home-button">Home</button>
      </div>
    </nav>
  </header>

  <div id="login-div" style="margin: 20px; display: flex; align-items: center; gap: 10px;">
    <button id="googleSignIn" style="padding: 8px 16px; border-radius: 8px; border: none; background-color: #4285F4; color: white; cursor: pointer;">
      Sign in with Google
    </button>
    <button id="signOut" style="padding: 8px 16px; border-radius: 8px; border: none; background-color: #f44336; color: white; cursor: pointer; display: none;">
      Sign out
    </button>
    <span id="userName" style="font-weight: bold;"></span>
  </div>

  <button id="filters-toggle" class="filters-toggle">Filters ▼</button>

  <div class="filters">
    <label><input type="checkbox" value="not learnt" checked> Not Learnt</label>
    <label><input type="checkbox" value="learning" checked> Learning</label>
    <label><input type="checkbox" value="complete" checked> Complete</label>
  </div>

  <main>
    <div id="alg-list"></div>
  </main>

  <script src="dark-mode.js"></script>
  <script type="module" src="script-algs.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA_DBD5S1sv7FGv_K6F7tUWxYs-JG3Jw-8",
      authDomain: "algdrill.firebaseapp.com",
      projectId: "algdrill",
      storageBucket: "algdrill.firebasestorage.app",
      messagingSenderId: "612013160",
      appId: "1:612013160:web:d664a05d36f71cf2c0d7dd",
      measurementId: "G-FKCJTNPWW2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const signInBtn = document.getElementById('googleSignIn');
    const signOutBtn = document.getElementById('signOut');
    const userNameSpan = document.getElementById('userName');

    signInBtn.addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (err) { console.error(err); }
    });

    signOutBtn.addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        signInBtn.style.display = 'none';
        signOutBtn.style.display = 'inline-block';
        userNameSpan.textContent = `Hello, ${user.displayName}`;

        // Load user data from Firestore
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        let customAlts = {};
        let statuses = {};

        if (docSnap.exists()) {
          const data = docSnap.data();
          customAlts = data.customAlts || {};
          statuses = data.statuses || {};
        } else {
          await setDoc(docRef, { customAlts: {}, statuses: {} });
        }

        // Save to localStorage so script-algs.js can use it!
        localStorage.setItem('customAlts', JSON.stringify(customAlts));
        localStorage.setItem('savedStatuses', JSON.stringify(statuses));

      } else {
        signInBtn.style.display = 'inline-block';
        signOutBtn.style.display = 'none';
        userNameSpan.textContent = '';

        // Clear local storage on sign out
        localStorage.removeItem('customAlts');
        localStorage.removeItem('savedStatuses');
      }
    });
  </script>

  <script>
    const filtersToggle = document.getElementById('filters-toggle');
    const filtersDiv = document.querySelector('.filters');

    function updateFilterVisibility() {
      if (window.innerWidth <= 768) {
        filtersDiv.style.display = 'none';
      } else {
        filtersDiv.style.display = 'flex';
      }
    }

    filtersToggle.addEventListener('click', () => {
      const isVisible = filtersDiv.style.display === 'block' || filtersDiv.style.display === 'flex';
      if (isVisible) {
        filtersDiv.style.display = 'none';
        filtersToggle.textContent = 'Filters ▼';
      } else {
        filtersDiv.style.display = 'flex';
        filtersToggle.textContent = 'Filters ▲';
      }
    });

    window.addEventListener('resize', updateFilterVisibility);
    updateFilterVisibility(); // Run on load
  </script>
</body>
</html>
