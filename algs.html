<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Algorithms</title>
  <link rel="stylesheet" href="style-algs.css" />
  <style>
    /* Hide filter toggle on desktop */
    #filters-toggle {
      display: none;
    }

    @media (max-width: 768px) {
      #filters-toggle {
        display: block;
        margin: 10px;
        padding: 8px 12px;
        border-radius: 8px;
        background-color: #333;
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
      }

      .filters {
        position: static;
        flex-direction: column;
        margin: 10px;
        gap: 8px;
      }
    }

    /* AUTH MODAL STYLES ADDED TO MATCH HOME */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7); z-index: 999;
    }
    .auth-modal {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #222; padding: 20px; border-radius: 12px; z-index: 1000;
      flex-direction: column; gap: 12px; border: 1px solid #444; width: 300px;
    }
    .auth-input {
      padding: 10px; border-radius: 6px; border: 1px solid #555; background: #333; color: white;
    }
    .auth-btn {
      padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <button id="to-timer">Timer</button>
      <button id="to-algs" disabled>Algorithms</button>
      <div style="margin-left: auto; margin-right: auto; display: flex; gap: 10px;">
        <button id="dark-mode-toggle">🌙</button>
        <button id="home-button">Home</button>
      </div>
    </nav>
  </header>

  <div id="login-div" style="margin: 20px; display: flex; align-items: center; gap: 10px;">
    <button id="openAuthModalBtn" class="auth-btn" style="background-color: #4CAF50; color: white;">
      Sign In / Sign Up
    </button>
    <button id="signOut" style="padding: 8px 16px; border-radius: 8px; border: none; background-color: #f44336; color: white; cursor: pointer; display: none;">
      Sign out
    </button>
    <span id="userName" style="font-weight: bold; color: white;"></span>
  </div>

  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="auth-modal" id="authModal">
    <h2 style="color: white; margin-top: 0; text-align: center;">Welcome</h2>
    <button id="googleSignIn" class="auth-btn" style="background-color: #4285F4; color: white;">Sign in with Google</button>
    <button id="microsoftSignIn" class="auth-btn" style="background-color: #2F2F2F; color: white; display: flex; align-items: center; justify-content: center; gap: 10px;">
      <img src="https://authjs.dev/img/providers/microsoft.svg" width="18"> Sign in with Microsoft
    </button>
    <div style="color: #888; text-align: center; margin: 10px 0;">OR</div>
    <input type="email" id="emailInput" class="auth-input" placeholder="Email">
    <input type="password" id="passwordInput" class="auth-input" placeholder="Password">
    <div style="display: flex; gap: 10px;">
      <button id="emailSignInBtn" class="auth-btn" style="flex: 1; background-color: #2196F3; color: white;">Sign In</button>
      <button id="emailSignUpBtn" class="auth-btn" style="flex: 1; background-color: #FF9800; color: white;">Sign Up</button>
    </div>
    <p id="authErrorMsg" style="color: #ff6b6b; font-size: 0.85rem; text-align: center; margin: 0; min-height: 20px;"></p>
    <button id="closeModalBtn" class="auth-btn" style="background-color: #555; color: white; margin-top: 10px;">Cancel</button>
  </div>

  <button id="filters-toggle" class="filters-toggle">Filters ▼</button>

  <div class="filters">
    <label><input type="checkbox" value="not learnt" checked> Not Learnt</label>
    <label><input type="checkbox" value="learning" checked> Learning</label>
    <label><input type="checkbox" value="complete" checked> Complete</label>
  </div>

  <main>
    <div id="alg-list"></div>
  </main>

  <script src="dark-mode.js"></script>
  <script type="module" src="script-algs.js"></script>

  <script>
    const filtersToggle = document.getElementById('filters-toggle');
    const filtersDiv = document.querySelector('.filters');

    function updateFilterVisibility() {
      if (window.innerWidth <= 768) {
        filtersDiv.style.display = 'none';
      } else {
        filtersDiv.style.display = 'flex';
      }
    }

    filtersToggle.addEventListener('click', () => {
      const isVisible = filtersDiv.style.display === 'block' || filtersDiv.style.display === 'flex';
      if (isVisible) {
        filtersDiv.style.display = 'none';
        filtersToggle.textContent = 'Filters ▼';
      } else {
        filtersDiv.style.display = 'flex';
        filtersToggle.textContent = 'Filters ▲';
      }
    });

    window.addEventListener('resize', updateFilterVisibility);
    updateFilterVisibility(); // Run on load
  </script>
</body>
</html>
